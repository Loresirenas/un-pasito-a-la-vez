<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un pasito a la vez</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
<header class="header">
  <h1>🌸 Un pasito a la vez</h1>
  <p id="today"></p>
  <div class="progress"><div id="progressBar"></div></div>
  <small id="progressText">0% completado</small>
</header>

<section class="card">
<h2>😴 Sueño</h2>
<input id="sleep" type="number" step="0.5" placeholder="Horas">
<select id="sleepQuality">
<option>😴 Muy mal</option>
<option>😕 Mal</option>
<option selected>🙂 Bien</option>
<option>🤩 Excelente</option>
</select>
</section>

<section class="card">
<h2>🍽️ Comidas</h2>
<label><input class="track" type="checkbox" id="breakfast"> Desayuno</label>
<label><input class="track" type="checkbox" id="lunch"> Almuerzo</label>
<label><input class="track" type="checkbox" id="snack"> Merienda</label>
<label><input class="track" type="checkbox" id="dinner"> Cena</label>
</section>

<section class="card">
<h2>💧 Agua</h2>
<input id="water" class="track" type="range" min="0" max="6" value="0">
<p><span id="waterLabel">0</span> litros</p>
</section>

<section class="card">
<h2>🏃 Actividad</h2>
<input id="exercise" placeholder="Ej.: Caminata">
<input id="minutes" class="track" type="number" placeholder="Minutos">
<input id="steps" class="track" type="number" placeholder="Pasos">
<input id="weight" class="track" type="number" step="0.1" placeholder="Peso">
</section>

<section class="card">
<h2>😊 Estado de ánimo</h2>
<select id="mood">
<option>😍 Excelente</option>
<option>😄 Muy bien</option>
<option selected>🙂 Bien</option>
<option>😐 Regular</option>
<option>😔 Bajón</option>
</select>
</section>

<section class="card">
<h2>📝 Notas</h2>
<textarea id="notes"></textarea>
</section>

<nav class="bottom">
<button>🏠 Hoy</button>
<button disabled>📅 Historial</button>
<button disabled>📈 Estadísticas</button>
<button disabled>⚙️ Ajustes</button>
</nav>
</div>
<script src="app.js"></script>
</body>
</html>
