<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un pasito a la vez</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#fff5f8;
    color:#444;
}
.container{
    max-width:420px;
    margin:auto;
    padding:20px;
}
.card{
    background:white;
    border-radius:18px;
    padding:16px;
    margin-bottom:16px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}
h1{
    color:#e85d9e;
    text-align:center;
}
.subtitle{
    text-align:center;
    color:#888;
}
label{display:block;margin:8px 0;}
input[type=number],input[type=text],textarea,select{
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:10px;
    box-sizing:border-box;
}
textarea{min-height:80px;}
.progress{
    width:100%;
    height:18px;
    background:#f1dce7;
    border-radius:9px;
    overflow:hidden;
}
.bar{
    height:100%;
    width:0%;
    background:#f57db4;
}
footer{
    text-align:center;
    color:#777;
    margin:30px 0;
}
</style>
</head>
<body>
<div class="container">
<h1>🌸 Un pasito a la vez</h1>
<p class="subtitle">Cada pequeño paso te acerca a tu objetivo.</p>

<div class="card">
<strong>📅 Fecha:</strong>
<p id="fecha"></p>
</div>

<div class="card">
<h3>😴 Sueño</h3>
<label>Horas dormidas
<input type="number" placeholder="Ej. 7.5">
</label>
<label>Calidad
<select>
<option>😴 Muy mal</option>
<option>😕 Mal</option>
<option>😐 Regular</option>
<option selected>🙂 Bien</option>
<option>🤩 Excelente</option>
</select>
</label>
</div>

<div class="card">
<h3>🍽️ Comidas</h3>
<label><input type="checkbox"> Desayuno</label>
<label><input type="checkbox"> Almuerzo</label>
<label><input type="checkbox"> Merienda</label>
<label><input type="checkbox"> Cena</label>
</div>

<div class="card">
<h3>💧 Agua</h3>
<label><input type="checkbox"> 0,5 L</label>
<label><input type="checkbox"> 1 L</label>
<label><input type="checkbox"> 1,5 L</label>
<label><input type="checkbox"> 2 L</label>
<label><input type="checkbox"> 2,5 L</label>
<label><input type="checkbox"> 3 L</label>
</div>

<div class="card">
<h3>🏃 Ejercicio</h3>
<label>Tipo
<input type="text" placeholder="Caminata, cardio...">
</label>
<label>Minutos
<input type="number">
</label>
</div>

<div class="card">
<h3>👣 Actividad</h3>
<label>Pasos<input type="number"></label>
<label>Kilómetros<input type="number" step="0.1"></label>
</div>

<div class="card">
<h3>⚖️ Peso</h3>
<input type="number" step="0.1" placeholder="kg">
</div>

<div class="card">
<h3>😊 Estado de ánimo</h3>
<select>
<option>😍 Excelente</option>
<option>😄 Muy bien</option>
<option selected>🙂 Bien</option>
<option>😐 Regular</option>
<option>😔 Bajón</option>
</select>
</div>

<div class="card">
<h3>📝 Notas</h3>
<textarea placeholder="Escribí algo sobre tu día..."></textarea>
</div>

<div class="card">
<h3>📊 Progreso</h3>
<div class="progress"><div class="bar"></div></div>
<p>La barra será automática en la próxima versión.</p>
</div>

<footer>
💗 Versión 1.0 - Un pasito a la vez
</footer>

</div>

<script>
document.getElementById("fecha").textContent =
new Date().toLocaleDateString("es-ES",
{weekday:"long",year:"numeric",month:"long",day:"numeric"});
</script>

</body>
</html>
